<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Tech Guessing Game</title>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #1f2933;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .game-box {
      background-color: #334e68;
      max-width: 600px;
      margin: auto;
      padding: 30px;
      border-radius: 15px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 8px;
    }

    button {
      cursor: pointer;
      background-color: #f0b429;
      border: none;
      border-radius: 6px;
    }

    a {
      color: #f0b429;
    }
  </style>
</head>
<body>

  <div class="game-box">
    <h1>Retro Tech Number Game</h1>
    <p>Guess the secret number between 1 and 20.</p>

    <input type="number" id="guessInput" min="1" max="20">
    <button onclick="checkGuess()">Guess</button>
    <button onclick="resetGame()">Reset</button>

    <h2 id="message">Make your first guess!</h2>
    <p id="attempts">Attempts: 0</p>

    <p>
  <a href="index.html">Return Home</a>
</p>

<p>
  <a href="scratch.html">Scratch Page</a>
</p>
  </div>

  <script>
    let secretNumber = Math.floor(Math.random() * 20) + 1;
    let attempts = 0;

    function checkGuess() {
      const guess = Number(document.getElementById("guessInput").value);
      const message = document.getElementById("message");
      attempts++;

      if (guess === secretNumber) {
        message.textContent = "Correct! You found the secret number.";
      } else if (guess < secretNumber) {
        message.textContent = "Too low. Try again.";
      } else {
        message.textContent = "Too high. Try again.";
      }

      document.getElementById("attempts").textContent = "Attempts: " + attempts;
    }

    function resetGame() {
      secretNumber = Math.floor(Math.random() * 20) + 1;
      attempts = 0;
      document.getElementById("message").textContent = "New game started!";
      document.getElementById("attempts").textContent = "Attempts: 0";
      document.getElementById("guessInput").value = "";
    }
  </script>

</body>
</html>
